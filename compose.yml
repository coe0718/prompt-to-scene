name: hermes-review

services:
  app:
    build: .
    container_name: hermes-review-app
    restart: unless-stopped
    ports:
      - "7041:7041"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7041/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
