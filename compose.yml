name: hermes-review

services:
  app:
    build:
      context: .
    container_name: hermes-review-app
    restart: unless-stopped
    ports:
      - "7041:7041"
    env_file:
      - .env
    environment:
      PORT: "7041"
      AUDIT_FETCH_CONCURRENCY: "${AUDIT_FETCH_CONCURRENCY:-8}"
      AUDIT_DEEP_CONCURRENCY: "${AUDIT_DEEP_CONCURRENCY:-2}"
      AUDIT_AGG_CONCURRENCY: "${AUDIT_AGG_CONCURRENCY:-2}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7041/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
