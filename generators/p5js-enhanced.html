<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Enhanced p5.js Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/2.0.5/p5.min.js"></script>
<script>try{window.addEventListener("deviceorientation",function(){},true);window.addEventListener("devicemotion",function(){},true)}catch(e){}</script>
<style>html,body{margin:0;padding:0;overflow:hidden;background:#000}canvas{display:block}</style>
</head>
<body>
<script>
// ════════════════════════════════════════════════════════════════
// 4-LAYER ENHANCED p5.js RENDERER
// Layer 1: Ambient background (noise field + floating particles)
// Layer 2: Style renderer (8 enhanced styles)
// Layer 3: Post-processing (bloom, vignette, scanlines)
// Layer 4: Beat pulse rings
// ════════════════════════════════════════════════════════════════

// Scene config
const specData = JSON.parse(document.body.getAttribute('data-spec') || '{}');
const S = specData.scene || { name: 'untitled', tempo: 120, duration: 45 };
const V = specData.visual || {}; const raw = V.color_palette || V.palette; V.palette = (raw && raw.length) ? raw : ['#ff6b6b','#feca57','#00d4ff','#2d1b69']; V.effects = (V.effects && V.effects.length) ? V.effects : ['bloom','vignette']; V.style = V.style || 'particles'; V.intensity = V.intensity ?? 0.7;
const T = specData.timing || { beatMs: 500, sections: [], keyMoments: [] };

// Palette hues
const P = V.palette.map(h => {
  const r = parseInt(h.slice(1,3),16)/255, g = parseInt(h.slice(3,5),16)/255, b = parseInt(h.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max-min;
  let hue = 0;
  if (d !== 0) {
    if (max === r) hue = ((g-b)/d + (g<b?6:0)) * 60;
    else if (max === g) hue = ((b-r)/d + 2) * 60;
    else hue = ((r-g)/d + 4) * 60;
  }
  return { h: hue%360, s: max===0 ? 0 : (d/max)*100, b: max*100 };
});

// ═══ STATE ═══
console.log("Enhanced p5.js v2 loaded — scene:",S.name,"style:",V.style,"palette:",V.palette.length+" colors"); var startTime, pgBloom, pgVignette;
var ambientParticles = [], attractors = [], pulses = [];
var particles = [], organicNodes = [], organicConns = [];
var prevBeat = -1;

// ═══ LAYER 1: AMBIENT BACKGROUND ═══
function initAmbient() {
  // Floating ambient particles
  for (let i = 0; i < 80; i++) {
    ambientParticles.push({
      x: random(width), y: random(height),
      vx: random(-0.3, 0.3), vy: random(-0.5, -0.1),
      size: random(1, 3), hue: (P.length ? random(P).h : 200), alpha: random(20, 60)
    });
  }
  // Attractor points for particle field
  for (let i = 0; i < 3; i++) {
    attractors.push({
      x: width * (0.2 + i * 0.3), y: height * 0.5,
      strength: 1.5, drift: random(TWO_PI)
    });
  }
}

function drawAmbient(t, p) {
  // Noise-driven background
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
  const step = 40;
  for (let y = 0; y < height; y += step) {
    for (let x = 0; x < width; x += step) {
      const n = noise(x * 0.003, y * 0.003, t * 0.1);
      const pi = Math.floor(n * P.length);
      const c = P[Math.min(pi, P.length - 1)] || { h: 200, s: 30, b: 40 };
      const brightness = 8 + n * 14;
      fill(c.h, c.s * 0.3, brightness, c.b > 50 ? 60 : 30);
      rect(x, y, step, step);
    }
  }
  
  // Floating ambient particles
  for (const ap of ambientParticles) {
    ap.x += ap.vx + sin(t * 0.5 + ap.y * 0.01) * 0.2;
    ap.y += ap.vy;
    if (ap.y < -10) { ap.y = height + 10; ap.x = random(width); }
    if (ap.x < -10) ap.x = width + 10;
    if (ap.x > width + 10) ap.x = -10;
    fill(ap.hue, 30, 80, ap.alpha);
    circle(ap.x, ap.y, ap.size);
  }
  
  // Drift attractors
  for (const at of attractors) {
    at.x += sin(t * 0.3 + at.drift) * 0.5;
    at.y += cos(t * 0.4 + at.drift) * 0.3;
    at.x = constrain(at.x, width * 0.1, width * 0.9);
    at.y = constrain(at.y, height * 0.1, height * 0.9);
  }
}

// ═══ LAYER 2: ENHANCED STYLE RENDERERS ═══

// ── PARTICLES (attractor/repulsor + connections + trails) ──
function initParticlesEnhanced() {
  particles = [];
  for (let i = 0; i < 300; i++) {
    particles.push({
      x: random(width), y: random(height),
      vx: random(-1, 1), vy: random(-1, 1),
      hue: P[Math.floor(random(P.length))].h,
      size: random(1.5, 4),
      trail: []
    });
  }
}

function drawParticlesEnhanced(t, p, beat) {
  const sp = V.intensity * 0.6 + 0.4;
  // Attractor/repulsor physics
  for (const pt of particles) {
    let fx = 0, fy = 0;
    for (const at of attractors) {
      const dx = at.x - pt.x, dy = at.y - pt.y;
      const dist = Math.sqrt(dx*dx + dy*dy) + 0.01;
      const force = at.strength / dist;
      if (dist < 80) {
        // Repulsion zone
        fx -= (dx / dist) * force * 3;
        fy -= (dy / dist) * force * 3;
      } else {
        // Attraction zone
        fx += (dx / dist) * force;
        fy += (dy / dist) * force;
      }
    }
    // Noise wind
    const n = noise(pt.x * 0.002, pt.y * 0.002, t * 0.15);
    const angle = n * TWO_PI * 3;
    fx += cos(angle) * 0.15;
    fy += sin(angle) * 0.15;
    pt.vx += fx * 0.1;
    pt.vy += fy * 0.1;
    pt.vx *= 0.97;
    pt.vy *= 0.97;
    const speed = Math.sqrt(pt.vx*pt.vx + pt.vy*pt.vy);
    if (speed > 5) { pt.vx *= 5/speed; pt.vy *= 5/speed; }
    pt.x += pt.vx * sp;
    pt.y += pt.vy * sp;
    if (pt.x < 0) pt.x = width;
    if (pt.x > width) pt.x = 0;
    if (pt.y < 0) pt.y = height;
    if (pt.y > height) pt.y = 0;
    pt.trail.push({ x: pt.x, y: pt.y });
    if (pt.trail.length > 12) pt.trail.shift();
  }
  
  // Draw connections between nearby particles
  strokeWeight(0.4);
  for (let i = 0; i < particles.length; i += 3) {
    for (let j = i + 10; j < particles.length; j += 10) {
      const a = particles[i], b = particles[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 90) {
        const alpha = map(dist, 0, 90, 40, 0);
        stroke((a.hue + b.hue)/2, 40, 80, alpha);
        line(a.x, a.y, b.x, b.y);
      }
    }
  }
  
  // Draw trails
  noFill();
  for (const pt of particles) {
    if (pt.trail.length < 2) continue;
    for (let i = 1; i < pt.trail.length; i++) {
      const alpha = (i / pt.trail.length) * 60;
      stroke(pt.hue, 50, 90, alpha);
      strokeWeight(pt.size * (i / pt.trail.length));
      line(pt.trail[i-1].x, pt.trail[i-1].y, pt.trail[i].x, pt.trail[i].y);
    }
  }
  
  // Draw particle dots
  for (const pt of particles) {
    fill(pt.hue, 30, 100, 180);
    noStroke();
    circle(pt.x, pt.y, pt.size);
  }
}

// ── GEOMETRIC (nested rotating shapes + vertex connections + morph) ──
function drawGeoEnhanced(t, p, beat) {
  const cx = width/2, cy = height/2;
  const layers = 4;
  const maxR = Math.min(cx, cy) * 0.4;
  
  push();
  translate(cx, cy);
  
  for (let l = 0; l < layers; l++) {
    const r = maxR * (0.4 + l * 0.2) * (sin(t * 0.3 + l) * 0.2 + 0.8);
    const rot = t * (0.15 + l * 0.05) * (l % 2 === 0 ? 1 : -1);
    const sides = 3 + l + Math.floor(sin(t * 0.25) * 1.5);
    const c = P[l % P.length];
    
    push();
    rotate(rot);
    
    // Draw shape
    strokeWeight(1.5 + l * 0.3);
    stroke(c.h, c.s * 0.7, c.b, 70 + l * 5);
    noFill();
    beginShape();
    for (let i = 0; i <= sides; i++) {
      const a = (i / sides) * TWO_PI;
      const vr = r + sin(a * 3 + t * 2) * 15 * V.intensity;
      vertex(cos(a) * vr, sin(a) * vr);
    }
    endShape();
    
    // Vertex points
    fill(c.h, 80, 100, 200);
    noStroke();
    for (let i = 0; i < sides; i++) {
      const a = (i / sides) * TWO_PI;
      const vr = r + sin(a * 3 + t * 2) * 15 * V.intensity;
      circle(cos(a) * vr, sin(a) * vr, 4 + l);
    }
    pop();
  }
  
  // Connecting lines between layers
  for (let l = 0; l < layers - 1; l++) {
    const r1 = maxR * (0.4 + l * 0.2) * (sin(t * 0.3 + l) * 0.2 + 0.8);
    const r2 = maxR * (0.4 + (l+1) * 0.2) * (sin(t * 0.3 + l+1) * 0.2 + 0.8);
    const sides1 = 3 + l + Math.floor(sin(t * 0.25) * 1.5);
    const sides2 = 4 + l + Math.floor(sin(t * 0.25) * 1.5);
    const c = P[l % P.length];
    
    stroke(c.h, 40, 70, 20);
    strokeWeight(0.5);
    for (let i = 0; i < Math.max(sides1, sides2); i++) {
      const a1 = ((i % sides1) / sides1) * TWO_PI + t * (0.15 + l * 0.05) * (l%2?1:-1);
      const a2 = ((i % sides2) / sides2) * TWO_PI + t * (0.15 + (l+1)*0.05) * ((l+1)%2?1:-1);
      line(cos(a1)*r1, sin(a1)*r1, cos(a2)*r2, sin(a2)*r2);
    }
  }
  
  pop();
}

// ── ASCII (larger grid, color cycling, density mapping) ──
function drawAsciiEnhanced(t, p, beat) {
  const ch = ' .:-=+*#%@';
  const aw = 100, ah = 60;
  const cw = width / aw, ch2 = height / ah;
  
  textAlign(CENTER, CENTER);
  textSize(cw * 1.1);
  
  for (let y = 0; y < ah; y++) {
    const rowHue = ((y / ah) * 120 + t * 15) % 360;
    for (let x = 0; x < aw; x++) {
      // Multi-octave noise for density
      const n = noise(x * 0.04, y * 0.06, t * 0.2) * 0.6 +
                noise(x * 0.08, y * 0.12, t * 0.35) * 0.3 +
                noise(x * 0.15, y * 0.2, t * 0.5) * 0.1;
      const ci = Math.floor(n * (ch.length - 1));
      const brightness = 40 + n * 35;
      fill(rowHue, 50, brightness, 70 + n * 20);
      text(ch[Math.min(ci, ch.length - 1)], x * cw + cw/2, y * ch2 + ch2/2);
    }
  }
}

// ── ORGANIC (bezier curves + growth patterns) ──
function initOrganicEnhanced() {
  organicNodes = [];
  organicConns = [];
  const n = 40;
  for (let i = 0; i < n; i++) {
    organicNodes.push({
      bx: random(width), by: random(height),
      x: 0, y: 0,
      size: random(3, 8), hue: P[Math.floor(random(P.length))].h,
      phase: random(TWO_PI), freq: random(0.3, 1.5),
      cpOffset: random(TWO_PI)
    });
  }
  // Connect nearby nodes
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const dx = organicNodes[i].bx - organicNodes[j].bx;
      const dy = organicNodes[i].by - organicNodes[j].by;
      if (Math.sqrt(dx*dx + dy*dy) < width * 0.25) {
        organicConns.push({ a: i, b: j });
      }
    }
  }
}

function drawOrganicEnhanced(t, p, beat) {
  // Update node positions with bezier-like motion
  for (const node of organicNodes) {
    const n = noise(node.bx * 0.002, node.by * 0.002, t * 0.15);
    const angle = n * TWO_PI * 4;
    const dist = noise(node.bx * 0.004, node.by * 0.004, t * 0.12 + 200) * 150 * V.intensity;
    node.x = node.bx + cos(angle) * dist + sin(t * node.freq + node.phase) * 30;
    node.y = node.by + sin(angle) * dist + cos(t * node.freq * 0.7 + node.phase) * 30;
  }
  
  // Draw connections as bezier curves
  strokeWeight(0.6);
  for (const conn of organicConns) {
    const a = organicNodes[conn.a], b = organicNodes[conn.b];
    const midX = (a.x + b.x) / 2, midY = (a.y + b.y) / 2;
    const cpDist = dist(a.x, a.y, b.x, b.y) * 0.4;
    const cpAngle = atan2(b.y - a.y, b.x - a.x) + sin(t * 0.5 + conn.a) * 0.5;
    const cpx = midX + cos(cpAngle + HALF_PI) * cpDist;
    const cpy = midY + sin(cpAngle + HALF_PI) * cpDist;
    
    noFill();
    const hue = (a.hue + b.hue) / 2;
    stroke(hue, 40, 80, 15);
    bezier(a.x, a.y, cpx, cpy, cpx, cpy, b.x, b.y);
  }
  
  // Draw nodes with glow
  for (const node of organicNodes) {
    for (let r = node.size * 3; r > 0; r -= node.size * 0.3) {
      fill(node.hue, 30, 85, 15 * (r / (node.size * 3)));
      circle(node.x, node.y, r * 2);
    }
    fill(node.hue, 20, 100, 220);
    circle(node.x, node.y, node.size * 0.8);
  }
}

// ── GLITCH (chromatic offset + block displacement + scan tearing) ──
function drawGlitchEnhanced(t, p, beat) {
  // Chromatic aberration — draw 3 color channels offset
  const offset = 4 + sin(t * 3) * 3;
  
  push();
  // Red channel offset
  drawingContext.save();
  drawingContext.globalCompositeOperation = 'screen';
  tint(255, 0, 0, 80);
  image(get(), -offset, 0);
  // Blue channel offset  
  tint(0, 0, 255, 80);
  image(get(), offset, 0);
  drawingContext.restore();
  pop();
  
  // Block displacement
  const blocks = 12;
  for (let i = 0; i < blocks; i++) {
    if (random() < 0.3) {
      const bx = random(width);
      const by = random(height);
      const bw = random(40, 200);
      const bh = random(8, 40);
      const dx = random(-30, 30);
      const c = P[Math.floor(random(P.length))];
      
      // Draw displaced block
      fill(c.h, 60, 80, 30);
      noStroke();
      rect(bx + dx, by, bw, bh);
    }
  }
  
  // Scan tearing — horizontal slices
  strokeWeight(1);
  for (let i = 0; i < 5; i++) {
    const y = random(height);
    const c = P[Math.floor(random(P.length))];
    stroke(c.h, 80, 90, 40);
    line(random(-20, 20), y, width + random(-20, 20), y);
  }
  
  // Distorted circles in center
  const cx = width/2, cy = height/2;
  for (let i = 0; i < 6; i++) {
    const r = 50 + i * 55 + sin(t * 2 + i) * 20;
    const c = P[i % P.length];
    stroke(c.h, 60, 90, 30 + random(20));
    strokeWeight(1 + random(1.5));
    noFill();
    beginShape();
    for (let j = 0; j <= 40; j++) {
      const a = (j / 40) * TWO_PI;
      const vr = r + noise(a * 3, i * 0.5, t * 0.8) * 25 * V.intensity;
      vertex(cx + cos(a) * vr, cy + sin(a) * vr);
    }
    endShape();
  }
}

// ── WAVEFORM (enhanced with mirroring + gradient fills) ──
function drawWaveEnhanced(t, p, beat) {
  const bars = 80;
  const bw = width / bars;
  const midY = height * 0.55;
  
  for (let i = 0; i < bars; i++) {
    const n1 = noise(i * 0.08, t * 0.4) * V.intensity;
    const n2 = sin(t * (2.5 + i * 0.05)) * 0.25;
    const val = n1 * 0.7 + n2 * 0.3;
    const bh = val * height * 0.45;
    const hue = ((i / bars) * 200 + t * 25) % 360;
    
    // Gradient fill upward and downward (mirrored)
    for (let sy = 0; sy < floor(bh); sy++) {
      const alpha = map(sy, 0, bh, 90, 10);
      fill(hue, 50, 70 + (sy/bh) * 20, alpha);
      noStroke();
      rect(i * bw, midY - sy, bw - 1, 1);
      rect(i * bw, midY + sy, bw - 1, 1);
    }
    // Bar cap
    const capAlpha = 180 + sin(i * 0.2 + t * 3) * 60;
    fill(hue, 30, 100, capAlpha);
    rect(i * bw, midY - bh, bw - 1, 2);
    rect(i * bw, midY + bh, bw - 1, 2);
  }
}

// ── MINIMAL (clean geometric composition) ──
function drawMinEnhanced(t, p, beat) {
  const cx = width/2, cy = height/2;
  const sz = Math.min(cx, cy) * 0.5;
  const br = sin(t * 0.25) * 0.1 + 0.9;
  const r = sz * br;
  
  // Concentric circles
  noFill();
  for (let i = 6; i >= 0; i--) {
    const c = P[i % P.length];
    strokeWeight(1.2 + i * 0.15);
    stroke(c.h, 25, 85, 90 - i * 12);
    circle(cx, cy, r * (1 - i * 0.08) * 2);
  }
  
  // Floating line
  const ly = cy + sin(t * 0.2) * r * 0.8;
  stroke(P[0].h, 35, 90, 50);
  strokeWeight(0.6);
  line(cx - sz * 0.85, ly, cx + sz * 0.85, ly);
  
  // Central dot with subtle pulse
  const dotR = 5 + sin(t * 3) * 2;
  fill(P[1].h, 30, 100, 220);
  noStroke();
  circle(cx, ly, dotR);
}

// ── RETRO (pixel grid + palette cycling + scanlines) ──
function drawRetroEnhanced(t, p, beat) {
  const sc = 3; // pixel scale
  const cols = Math.floor(width / sc);
  const rows = Math.floor(height / sc);
  
  // Pixel grid with perlin noise and palette cycling
  noStroke();
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const n = noise(x * 0.06, y * 0.06, t * 0.2);
      const pi = Math.floor(n * P.length);
      const c = P[Math.min(pi, P.length - 1)] || { h: 200, s: 30, b: 40 };
      const brightness = 20 + n * 50 + sin(x * 0.1 + t) * 10;
      fill(c.h, 40, brightness, 180);
      rect(x * sc, y * sc, sc, sc);
    }
  }
  
  // Grid lines
  stroke(0, 0, 5, 15);
  strokeWeight(0.5);
  for (let x = 0; x < width; x += sc) line(x, 0, x, height);
  for (let y = 0; y < height; y += sc) line(0, y, width, y);
  
  // Decorative elements
  const cx = width/2, cy = height/3;
  fill(P[0].h, 70, 90, 180);
  noStroke();
  rect(cx - sc * 8, cy - sc * 6, sc * 16, sc * 12, 4);
  fill(P[1].h, 60, 95, 200);
  rect(cx - sc * 5, cy - sc * 3, sc * 10, sc * 6, 3);
}

// ═══ LAYER 3: POST-PROCESSING ═══
function applyPostProcessing(t, beat) {
  const hasBloom = V.effects.includes('bloom');
  const hasVignette = V.effects.includes('vignette');
  const hasScanlines = V.effects.includes('scanlines');
  const hasChromatic = V.effects.includes('chromatic');
  
  // Bloom — cheap approximation: semi-transparent overlay of current frame shifted
  if (hasBloom) {
    drawingContext.save();
    drawingContext.globalCompositeOperation = 'lighter';
    drawingContext.globalAlpha = 0.12;
    drawingContext.drawImage(drawingContext.canvas, -2, -2);
    drawingContext.drawImage(drawingContext.canvas, 2, 2);
    drawingContext.globalAlpha = 0.06;
    drawingContext.drawImage(drawingContext.canvas, -4, -4);
    drawingContext.drawImage(drawingContext.canvas, 4, 4);
    drawingContext.restore();
  }
  
  // Vignette
  if (hasVignette) {
    const grad = drawingContext.createRadialGradient(width/2, height/2, Math.min(width,height)*0.4, width/2, height/2, Math.min(width,height)*0.75);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.5)');
    drawingContext.save();
    drawingContext.fillStyle = grad;
    drawingContext.fillRect(0, 0, width, height);
    drawingContext.restore();
  }
  
  // Scanlines
  if (hasScanlines) {
    drawingContext.save();
    drawingContext.fillStyle = 'rgba(0,0,0,0.04)';
    for (let y = 0; y < height; y += 3) {
      drawingContext.fillRect(0, y, width, 1);
    }
    drawingContext.restore();
  }
}

// ═══ LAYER 4: BEAT PULSE RINGS ═══
function drawBeatPulses(t, beat) {
  // Create new pulse on beat
  if (beat !== prevBeat && beat > 0) {
    prevBeat = beat;
    const count = 2 + Math.floor(V.intensity * 4);
    for (let i = 0; i < count; i++) {
      pulses.push({
        x: random(width * 0.2, width * 0.8),
        y: random(height * 0.2, height * 0.8),
        r: 0, maxR: random(40, 150),
        hue: P[Math.floor(random(P.length))].h,
        alpha: 200
      });
    }
  }
  
  // Draw active pulses
  noFill();
  for (let i = pulses.length - 1; i >= 0; i--) {
    const pu = pulses[i];
    pu.r += 3 * V.intensity;
    pu.alpha *= 0.92;
    
    if (pu.alpha < 2 || pu.r > pu.maxR) {
      pulses.splice(i, 1);
      continue;
    }
    
    stroke(pu.hue, 60, 90, pu.alpha);
    strokeWeight(2 * (1 - pu.r / pu.maxR));
    circle(pu.x, pu.y, pu.r * 2);
  }
}

// ═══ DRAW LOOP ═══
function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 100);
  
  initAmbient();
  
  if (V.style === 'particles') initParticlesEnhanced();
  if (V.style === 'organic') initOrganicEnhanced();
  
  startTime = millis();
}

function draw() {
  background(0, 0, 4); // clear to near-black
  const t = ((millis() - startTime) / 1000) % S.duration;
  const p = t / S.duration;
  const beat = Math.floor(t * 1000 / T.beatMs);
  
  // Layer 1: Ambient background
  drawAmbient(t, p);
  
  // Layer 2: Style renderer
  switch (V.style) {
    case 'ascii': drawAsciiEnhanced(t, p, beat); break;
    case 'geometric': drawGeoEnhanced(t, p, beat); break;
    case 'particles': drawParticlesEnhanced(t, p, beat); break;
    case 'waveform': drawWaveEnhanced(t, p, beat); break;
    case 'glitch': drawGlitchEnhanced(t, p, beat); break;
    case 'minimal': drawMinEnhanced(t, p, beat); break;
    case 'retro': drawRetroEnhanced(t, p, beat); break;
    case 'organic': drawOrganicEnhanced(t, p, beat); break;
    default: drawGeoEnhanced(t, p, beat);
  }
  
  // Layer 3: Post-processing
  applyPostProcessing(t, beat);
  
  // Layer 4: Beat pulse rings
  drawBeatPulses(t, beat);
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas(S.name + '-frame', 'png');
  // Cycle styles with number keys
  const styles = ['ascii','geometric','particles','waveform','glitch','minimal','retro','organic'];
  const idx = parseInt(key) - 1;
  if (idx >= 0 && idx < styles.length) {
    V.style = styles[idx];
    if (V.style === 'particles') initParticlesEnhanced();
    if (V.style === 'organic') initOrganicEnhanced();
  }
}
</script>
