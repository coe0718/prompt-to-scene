<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Enhanced ASCII Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/2.0.5/p5.min.js"></script>
<script>try{window.addEventListener("deviceorientation",function(){},true);window.addEventListener("devicemotion",function(){},true)}catch(e){}</script>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:'Courier New','Consolas',monospace}
canvas{display:block}
</style>
</head>
<body data-spec="{}">
<script>
// ════════════════════════════════════════════════════════════════
// 4-LAYER ENHANCED ASCII RENDERER
// Layer 1: Ambient background (noise + particles)
// Layer 2: ASCII renderer (density/rain/wave/pulse)
// Layer 3: Post-processing (scanlines, vignette, bloom)
// Layer 4: Beat pulse rings + section transitions
// ════════════════════════════════════════════════════════════════

// Scene config
const specData = JSON.parse(document.body.getAttribute('data-spec') || '{}');
const S = specData.scene || { name: 'ascii', tempo: 120, duration: 45 };
const V = specData.visual || {};
const raw = V.color_palette || V.palette;
V.palette = (raw && raw.length) ? raw : ['#00ff41','#00cc33','#0a2a0a','#003300','#ffffff'];
V.effects = (V.effects && V.effects.length) ? V.effects : ['scanlines','vignette'];
V.intensity = V.intensity ?? 0.7;
V.resolution = V.resolution || { width: 100, height: 60 };
V.ascii_char_set = V.ascii_char_set || 'standard';
const T = specData.timing || { beatMs: 500, sections: [], keyMoments: [] };

// Char sets
const CHAR_SETS = {
  standard: ' .:-=+*#%@',
  blocks:   ' ░▒▓█',
  detailed: " .'`^\",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$".split(''),
  matrix:   'ｦｧｨｩｪｫｬｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾝ',
  hex:      '0123456789ABCDEF ',
  braille:  ' ⠁⠂⠃⠄⠅⠆⠇⠈⠉⠊⠋⠌⠍⠎⠏⠐⠑⠒⠓⠔⠕⠖⠗⠘⠙⠚⠛⠜⠝⠞⠟⠠⠡⠢⠣⠤⠥⠦⠧⠨⠩⠪⠫⠬⠭⠮⠯⠰⠱⠲⠳⠴⠵⠶⠷⠸⠹⠺⠻⠼⠽⠾⠿'
};
const ASCII_STYLES = ['density','rain','wave','pulse'];
let activeStyle = 0; // cycle with 's' key
let chars = CHAR_SETS[V.ascii_char_set] || CHAR_SETS.standard;

// Palette hues
const P = V.palette.map(h => {
  const r = parseInt(h.slice(1,3),16)/255, g = parseInt(h.slice(3,5),16)/255, b = parseInt(h.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max-min;
  let hue = 0;
  if (d !== 0) {
    if (max === r) hue = ((g-b)/d + (g<b?6:0)) * 60;
    else if (max === g) hue = ((b-r)/d + 2) * 60;
    else hue = ((r-g)/d + 4) * 60;
  }
  return { h: hue%360, s: max===0 ? 0 : (d/max)*100, b: max*100, hex: h };
});

// ═══ STATE ═══
const CW = V.resolution.width, RH = V.resolution.height;
console.log("ASCII Enhanced loaded — grid: "+CW+"x"+RH+" chars: "+V.ascii_char_set+" style: "+ASCII_STYLES[activeStyle]);
var startTime, prevBeat = -1;
var ambientParticles = [], rainDrops = [], pulses = [];
var lastStyleSwitch = 0;

// ═══ LAYER 1: AMBIENT BACKGROUND ═══
function initAmbient() {
  for (let i = 0; i < 60; i++) {
    ambientParticles.push({
      x: random(width), y: random(height),
      vx: random(-0.2, 0.2), vy: random(-0.4, -0.05),
      size: random(1, 2.5), hue: (P.length ? random(P).h : 120),
      alpha: random(15, 45)
    });
  }
  // Rain drops for rain style
  for (let i = 0; i < 150; i++) {
    rainDrops.push({
      col: Math.floor(random(CW)),
      y: random(RH), speed: random(0.3, 2.5),
      char: chars[Math.floor(random(chars.length))] || '.',
      hue: (P.length ? random(P).h : 120)
    });
  }
}

function drawAmbient(t, p) {
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
  // Noise-driven background grid
  const step = 50;
  for (let y = 0; y < height; y += step) {
    for (let x = 0; x < width; x += step) {
      const n = noise(x * 0.002, y * 0.002, t * 0.08);
      const pi = Math.floor(n * P.length);
      const c = P[Math.min(pi, P.length - 1)] || { h: 120, s: 30, b: 20 };
      fill(c.h, c.s * 0.2, 5 + n * 8, 15);
      rect(x, y, step, step);
    }
  }
  // Floating particles
  for (const ap of ambientParticles) {
    ap.x += ap.vx + sin(t * 0.3 + ap.y * 0.01) * 0.15;
    ap.y += ap.vy;
    if (ap.y < -10) { ap.y = height + 10; ap.x = random(width); }
    if (ap.x < -10) ap.x = width + 10;
    if (ap.x > width + 10) ap.x = -10;
    fill(ap.hue, 20, 60, ap.alpha);
    circle(ap.x, ap.y, ap.size);
  }
}

// ═══ LAYER 2: ASCII RENDERER ═══

function drawASCIILayer(t, p, beat, sectionMul) {
  const cw = width / CW, ch = height / RH;
  textAlign(CENTER, CENTER);
  const fontSize = cw * 1.05;
  textSize(fontSize);
  const now = millis() / 1000;

  switch (ASCII_STYLES[activeStyle]) {

    // ─── DENSITY MAP ───
    case 'density':
      for (let y = 0; y < RH; y++) {
        const rowHue = ((y / RH) * 120 + t * 10 + (P[0]?.h || 120)) % 360;
        for (let x = 0; x < CW; x++) {
          // Multi-octave noise
          const n = noise(x * 0.03, y * 0.05, t * 0.15) * 0.55 +
                    noise(x * 0.06, y * 0.10, t * 0.25) * 0.30 +
                    noise(x * 0.12, y * 0.18, t * 0.4)  * 0.15;
          const ci = Math.floor(n * (chars.length - 1));
          const brightness = 30 + n * 45 * sectionMul;
          fill(rowHue, 40 + n * 20, brightness, 60 + n * 30);
          text(chars[Math.min(ci, chars.length - 1)], x * cw + cw/2, y * ch + ch/2);
        }
      }
      break;

    // ─── RAIN ───
    case 'rain':
      // Update rain drops
      for (const rd of rainDrops) {
        rd.y += rd.speed * V.intensity * sectionMul;
        if (rd.y > RH) {
          rd.y = -random(5);
          rd.col = Math.floor(random(CW));
          rd.speed = random(0.3, 2.5);
          rd.char = chars[Math.floor(random(chars.length))] || '.';
        }
        const trailLen = 14;
        for (let tr = 0; tr < trailLen && rd.y - tr >= 0; tr++) {
          const alpha = (1 - tr/trailLen) * 200 * sectionMul;
          const hue = ((rd.y / RH) * 80 + 140 + t * 20) % 360;
          fill(hue, 60, 60 + tr * 3, alpha);
          const ch2 = tr === 0 ? rd.char : chars[Math.floor(random(3))] || ' ';
          text(ch2, rd.col * cw + cw/2, (rd.y - tr) * ch + ch/2);
        }
      }
      break;

    // ─── WAVE ───
    case 'wave':
      for (let y = 0; y < RH; y++) {
        const waveVal = sin(y * 0.2 + t * 1.5) * 0.5 * sectionMul +
                        sin(y * 0.33 + t * 2.3) * 0.3 * sectionMul +
                        sin(y * 0.12 + t * 0.7) * 0.2;
        const offset = Math.floor(waveVal * CW * 0.4);
        const rowHue = ((y / RH) * 200 + t * 30) % 360;
        for (let x = 0; x < CW; x++) {
          const sx = ((x + offset + CW) % CW);
          const n = noise(sx * 0.02, y * 0.04, t * 0.1);
          const ci = Math.floor(n * (chars.length - 1));
          fill(rowHue, 50, 40 + n * 50, 70 + n * 25);
          text(chars[Math.min(ci, chars.length - 1)], x * cw + cw/2, y * ch + ch/2);
        }
      }
      break;

    // ─── PULSE RINGS ───
    case 'pulse':
      const cx2 = CW / 2, cy2 = RH / 2;
      const ringRadius = 8 + sin(t * 0.8) * 6 + beat * 0.3;
      const ringCount = 5;
      for (let y = 0; y < RH; y++) {
        for (let x = 0; x < CW; x++) {
          const dx = (x - cx2) / CW;
          const dy = (y - cy2) / RH;
          const dist = Math.sqrt(dx*dx + dy*dy);
          // Multiple concentric rings
          let val = 0;
          for (let r = 0; r < ringCount; r++) {
            const ringR = (0.05 + r * 0.07) * sectionMul;
            const ringDist = Math.abs(dist - ringR - sin(t * 2 + r) * 0.02);
            val += Math.max(0, 1 - ringDist * 20) * (0.6 + r * 0.1);
          }
          val = Math.min(1, val);
          const ci = Math.floor(val * (chars.length - 1));
          const hue = ((Math.atan2(dy, dx) / PI * 180 + 360 + t * 40) % 360);
          fill(hue, 50, 30 + val * 60, 40 + val * 60);
          text(chars[Math.min(ci, chars.length - 1)], x * cw + cw/2, y * ch + ch/2);
        }
      }
      break;
  }
}

// ═══ LAYER 3: POST-PROCESSING ═══
function applyPostProcessing(t, beat) {
  const hasScanlines = V.effects.includes('scanlines');
  const hasVignette = V.effects.includes('vignette');
  const hasBloom = V.effects.includes('bloom');
  const hasChromatic = V.effects.includes('chromatic');

  // Scanlines
  if (hasScanlines) {
    colorMode(RGB, 255);
    for (let y = 0; y < height; y += 3) {
      stroke(0, 0, 0, 25);
      strokeWeight(1);
      line(0, y, width, y);
    }
    colorMode(HSB, 360, 100, 100, 100);
  }

  // Vignette
  if (hasVignette) {
    drawingContext.save();
    const cx = width/2, cy = height/2;
    const maxR = Math.sqrt(cx*cx + cy*cy);
    const gradient = drawingContext.createRadialGradient(cx, cy, maxR * 0.4, cx, cy, maxR);
    gradient.addColorStop(0, 'rgba(0,0,0,0)');
    gradient.addColorStop(0.7, 'rgba(0,0,0,0.15)');
    gradient.addColorStop(1, 'rgba(0,0,0,0.55)');
    drawingContext.fillStyle = gradient;
    drawingContext.fillRect(0, 0, width, height);
    drawingContext.restore();
  }

  // Bloom — lighten center
  if (hasBloom) {
    drawingContext.save();
    drawingContext.globalCompositeOperation = 'lighter';
    const cx = width/2, cy = height/2;
    const gradient = drawingContext.createRadialGradient(cx, cy, 0, cx, cy, Math.min(cx, cy) * 0.6);
    gradient.addColorStop(0, 'rgba(255,255,255,0.06)');
    gradient.addColorStop(1, 'rgba(255,255,255,0)');
    drawingContext.fillStyle = gradient;
    drawingContext.fillRect(0, 0, width, height);
    drawingContext.restore();
  }

  // Chromatic offset — subtle RGB shift
  if (hasChromatic) {
    const offset = 2 + sin(t * 3) * 1.5;
    drawingContext.save();
    drawingContext.globalCompositeOperation = 'screen';
    drawingContext.globalAlpha = 0.04;
    const img = get();
    drawingContext.globalAlpha = 1;
    tint(255, 0, 0, 20);
    image(img, -offset, 0);
    tint(0, 0, 255, 20);
    image(img, offset, 0);
    drawingContext.restore();
  }
}

// ═══ LAYER 4: BEAT PULSE ═══
function drawBeatPulse(t, beat, sectionMul) {
  const beatPhase = ((t * 1000) % T.beatMs) / T.beatMs;

  // Ring on new beat
  if (beatPhase < 0.2 && beat !== prevBeat) {
    pulses.push({
      x: width * 0.5 + sin(t * 0.3) * width * 0.15,
      y: height * 0.5 + cos(t * 0.25) * height * 0.1,
      radius: 0, maxRadius: Math.min(width, height) * 0.25 * sectionMul,
      alpha: 60 * sectionMul,
      hue: P[beat % P.length]?.h || 120
    });
  }

  // Draw expanding rings
  for (let i = pulses.length - 1; i >= 0; i--) {
    const pulse = pulses[i];
    pulse.radius += (pulse.maxRadius - pulse.radius) * 0.08;
    const progress = pulse.radius / pulse.maxRadius;
    const alpha = pulse.alpha * (1 - progress) * (1 - progress);

    noFill();
    strokeWeight(1.5 * (1 - progress));
    stroke(pulse.hue, 40, 80, alpha);
    circle(pulse.x, pulse.y, pulse.radius * 2);

    if (progress > 0.95) pulses.splice(i, 1);
  }
}

// ═══ HELPERS ═══
function getSection(beat) {
  for (const s of T.sections) {
    if (beat >= s.start_beat && beat < s.end_beat) return s;
  }
  return null;
}

function getSectionMultiplier(beat, p) {
  const sec = getSection(beat);
  if (!sec) return 0.5 + p * 0.3;
  const bp = (beat % 4) / 4;
  switch (sec.name) {
    case 'intro':  return 0.3 + p * 0.5;
    case 'build':  return 0.4 + p * 0.6;
    case 'drop':   return 0.8 + bp * 0.2;
    case 'breakdown': return 0.3 + bp * 0.1;
    case 'outro':  return 0.5 * Math.max(0, 1 - (p > 0.85 ? (p - 0.85) / 0.15 : 0));
    case 'chorus': return 0.7 + bp * 0.2;
    case 'verse':  return 0.5 + bp * 0.15;
    case 'bridge': return 0.4 + bp * 0.2;
    default:       return 0.4 + p * 0.4;
  }
}

// ═══ SETUP & DRAW ═══
function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 100);
  textFont('Courier New');
  chars = CHAR_SETS[V.ascii_char_set] || CHAR_SETS.standard;
  initAmbient();
  startTime = millis();
}

function draw() {
  const t = ((millis() - startTime) / 1000) % S.duration;
  const p = t / S.duration;
  const beat = Math.floor(t * 1000 / T.beatMs);

  background(0, 0, 3);

  // Layer 1: Ambient
  drawAmbient(t, p);

  // Section multiplier
  const sectionMul = getSectionMultiplier(beat, p) * (0.6 + V.intensity * 0.4);

  // Layer 2: ASCII renderer
  drawASCIILayer(t, p, beat, sectionMul);

  // Layer 3: Post-processing
  applyPostProcessing(t, beat);

  // Layer 4: Beat pulses
  drawBeatPulse(t, beat, sectionMul);

  prevBeat = beat;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function keyPressed() {
  // 's' — cycle ASCII style
  if (key === 's' || key === 'S') {
    activeStyle = (activeStyle + 1) % ASCII_STYLES.length;
    console.log('ASCII style:', ASCII_STYLES[activeStyle]);
  }
  // 'f' — toggle fullscreen
  if (key === 'f' || key === 'F') {
    fullscreen(!fullscreen());
  }
  // 'c' — cycle char set
  if (key === 'c' || key === 'C') {
    const keys = Object.keys(CHAR_SETS);
    const curIdx = keys.indexOf(V.ascii_char_set);
    V.ascii_char_set = keys[(curIdx + 1) % keys.length];
    chars = CHAR_SETS[V.ascii_char_set];
    console.log('Char set:', V.ascii_char_set);
  }
}
</script>
</body>
</html>
